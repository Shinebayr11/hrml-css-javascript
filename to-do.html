<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./to-do.css" />
  </head>
  <body>
    <section class="todo">
      <div class="hero">
        <h1>To-Do list</h1>
        <div class="task">
          <input id="input" type="text" placeholder="Add a new task..." />
          <button id="Add" onclick="addtext()">Add</button>
        </div>
        <div class="filter">
          <button class="filterbutton" id="All" onclick="filterList('all')">
            All
          </button>
          <button
            class="filterbutton"
            id="Active"
            onclick="filterList('active')"
          >
            Active
          </button>
          <button
            class="filterbutton"
            id="Complete"
            onclick="filterList('completed')"
          >
            Completed
          </button>
        </div>
        <div class="tasks">
          <div id="tasks">
            <p id="yet">No tasks yet. Add one above!</p>
          </div>
        </div>
      </div>
      <footer>
        <p class="foottext">Powered by</p>
        <a class="footlink" href="https://pinecone.mn/">Pinecone academy</a>
      </footer>
    </section>

    <script src="./to-do.js"></script>
  </body>
</html>
